name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "SUPABASE_URL eksik"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" ]; then echo "SUPABASE_PUBLISHABLE_KEY eksik"; exit 1; fi
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then echo "KEYSTORE_BASE64 eksik"; exit 1; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then echo "KEYSTORE_PASSWORD eksik"; exit 1; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then echo "KEY_ALIAS eksik"; exit 1; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then echo "KEY_PASSWORD eksik"; exit 1; fi
          echo "Tüm secrets hazır"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/kolaytr-upload-key.jks

      - name: Create key.properties
        run: |
          printf '%s\n' \
            "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" \
            "keyPassword=${{ secrets.KEY_PASSWORD }}" \
            "keyAlias=${{ secrets.KEY_ALIAS }}" \
            "storeFile=kolaytr-upload-key.jks" \
            > android/key.properties

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze || true

      - name: Build signed release APK
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"

      - name: Verify APK signature
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)
          "$APKSIGNER" verify --verbose --print-certs build/app/outputs/flutter-apk/app-release.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: kolaytr-signed-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
