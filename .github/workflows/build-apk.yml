name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check secrets
        run: |
          test -n "${{ secrets.SUPABASE_URL }}"
          test -n "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"
          test -n "${{ secrets.KEYSTORE_BASE64 }}"
          test -n "${{ secrets.KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.KEY_ALIAS }}"
          test -n "${{ secrets.KEY_PASSWORD }}"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/kolaytr-upload-key.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=kolaytr-upload-key.jks" >> android/key.properties

      - name: Get packages
        run: flutter pub get

      - name: Build signed release APK
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"

      - name: Verify APK signature
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)
          "$APKSIGNER" verify --verbose --print-certs build/app/outputs/flutter-apk/app-release.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: kolaytr-signed-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
